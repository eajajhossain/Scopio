<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="options-body">
  <h1 style="margin:0 0 4px;font-size:20px">🔭 Scopio Lead Finder — Settings</h1>
  <p class="muted">Everything is stored locally in this browser.</p>

  <h3 style="margin:18px 0 0">1. Connect your Scopio account</h3>
  <label>Scopio server URL</label>
  <input id="url" placeholder="http://localhost:8000" value="http://localhost:8000" />
  <label>Email</label>
  <input id="email" type="email" placeholder="you@email.com" />
  <label>Password</label>
  <input id="password" type="password" />
  <button id="connectBtn">Connect</button>
  <div class="err" id="connErr"></div>
  <div class="ok" id="connOk"></div>

  <p class="muted" style="margin-top:22px">That's it — no API key needed. Searches use your
  Scopio account's free discovery (OpenStreetMap + Geoapify).</p>

  <script src="common.js"></script>
  <script src="options.js"></script>
</body>
</html>
